name: Deploy ResumeAI HeroPage

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dashboard dependencies
        run: |
          cd resumeai-dashboard
          npm install

      - name: Build ResumeAI Dashboard
        run: |
          cd resumeai-dashboard
          npm run build

      - name: Verify build output
        run: |
          ls -la resumeai-dashboard/dist || exit 1

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: resumeai-dashboard/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

